        rel="stylesheet">

    <link rel="stylesheet" href="https://unpkg.com/swiper/swiper-bundle.min.css" />

    <!-- Custom JavaScript -->
    <script src="https://unpkg.com/swiper/swiper-bundle.min.js"></script>
    <script>
        const folderId = '12v0gfzhGThyMAAVNzUTQCHZKvhp4fe3t';  // ID da sua pasta
        const apiKey = 'AIzaSyC3FqqHfNkDGCUDgJMvjMfbDguaqwYu6Uc'; // Sua chave de API

        async function fetchImages() {
            try {
                const response = await fetch(`https://www.googleapis.com/drive/v3/files?q='${folderId}'+in+parents&key=${apiKey}`);
                const data = await response.json();
                console.log('API Response:', data); // Log da resposta da API

                if (data.files && data.files.length > 0) {
                    const imagesDiv = document.getElementById('images');
                    const portfolioContent = document.createElement('div');
                    portfolioContent.classList.add('fotos-content'); // Adiciona a classe portfolio-content

                    data.files.forEach(file => {
                        console.log('File:', file); // Log de cada arquivo
                        if (file.mimeType.startsWith('image/')) {
                            const imgContainer = document.createElement('div');
                            imgContainer.classList.add('fotos'); // classe fotos para alinhar com o CSS existente

                            const img = document.createElement('img');
                            img.src = `https://drive.google.com/thumbnail?id=${file.id}`;
                            img.alt = file.name;
                            imgContainer.appendChild(img);

                            const layerDiv = document.createElement('div');
                            layerDiv.classList.add('layer'); // classe layer para texto sobreposto

                            const link = document.createElement('a');
                            link.href = `https://drive.google.com/uc?export=download&id=${file.id}`;
                            link.setAttribute('download', file.name);
                            link.setAttribute('target', '_blank'); // Adiciona o atributo target para abrir em nova aba
                            const linkIcon = document.createElement('i');
                            linkIcon.classList.add('bx', 'bx-download');
                            link.appendChild(linkIcon);
                            layerDiv.appendChild(link);

                            imgContainer.appendChild(layerDiv);

                            portfolioContent.appendChild(imgContainer);
                        }
                    });

                    imagesDiv.appendChild(portfolioContent);
                } else {
                    document.getElementById('images').innerText = 'Nenhuma imagem encontrada na pasta.';
                }
            } catch (error) {
                console.error('Erro ao buscar imagens:', error);
                document.getElementById('images').innerText = 'Erro ao buscar imagens.';
            }
        }

        fetchImages();
    </script>

</head>
